services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist HuggingFace model cache between rebuilds
      - hf_cache:/app/.cache/huggingface
      # Mount Hidra config directory so container can access cloud models and write TTS output
      - ${HOME}/.config/Hidra:${HOME}/.config/Hidra
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  hf_cache:
