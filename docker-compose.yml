services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Optional: for hot reloading during dev
      # Mount models or downloads if needed to persist them
      # - ./models:/app/models 
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python main.py
